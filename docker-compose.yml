version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: biocard-postgres
    environment:
      POSTGRES_USER: biocard
      POSTGRES_PASSWORD: biocard_dev_password
      POSTGRES_DB: biocard_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biocard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: biocard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Next.js App (Monolito)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biocard-app
    environment:
      DATABASE_URL: postgresql://biocard:biocard_dev_password@postgres:5432/biocard_dev
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev_nextauth_secret
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: biocard-network